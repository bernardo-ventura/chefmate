<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChefMate - Meal Planner AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f5;
      --surface: #ffffff;
      --surface2: #f5f3f0;
      --border: #e8e4de;
      --accent: #ff6b35;
      --accent2: #f7931e;
      --text: #2c1810;
      --text-muted: #9c8b7e;
      --user-bg: #fff4ed;
      --agent-bg: #f0f9f5;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      overflow: hidden;
    }

    /* subtle dot grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #c8c8c8 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.22;
    }

    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ── */
    header {
      padding: 22px 0 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1.5px solid var(--border);
    }

    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-text p {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-muted);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #d0d0d8;
      transition: background 0.3s;
    }

    .dot.online { background: var(--accent2); box-shadow: 0 0 7px color-mix(in srgb, var(--accent2) 60%, transparent); }
    .dot.loading { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Messages ── */
    #messages {
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.22s ease forwards;
      opacity: 0;
      transform: translateY(6px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-weight: 500;
    }

    .msg.user .avatar {
      background: var(--user-bg);
      border: 1.5px solid color-mix(in srgb, var(--accent) 22%, transparent);
      color: var(--accent);
      font-size: 10px;
    }

    .msg.agent .avatar {
      background: var(--agent-bg);
      border: 1.5px solid color-mix(in srgb, var(--accent2) 25%, transparent);
      color: var(--accent2);
    }

    .bubble {
      max-width: 76%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.68;
      font-family: var(--font-display);
      font-weight: 400;
      box-shadow: var(--shadow);
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1.5px solid color-mix(in srgb, var(--accent) 14%, transparent);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .msg.agent .bubble {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .msg.agent .bubble.error {
      border-color: #ffb3b3;
      color: #c0392b;
      background: #fff5f5;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: 13px 15px;
    }

    .typing-indicator span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px 0;
    }

    .empty-state .big-icon {
      font-size: 38px;
      opacity: 0.2;
    }

    .empty-state p {
      font-family: var(--font-mono);
      font-size: 11.5px;
      max-width: 280px;
      line-height: 1.75;
    }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
      background: var(--surface);
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, transparent);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 12%, transparent);
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 0 22px;
      border-top: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 15px;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 46px;
      max-height: 136px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .send-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.12s, box-shadow 0.2s;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .send-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 36%, transparent);
    }
    .send-btn:active:not(:disabled) { transform: translateY(1px); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-meta {
      display: flex; justify-content: space-between; align-items: center;
    }

    .api-url-row {
      display: flex; align-items: center; gap: 8px;
    }

    .api-url-row label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .api-url-row input {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
      outline: none;
      padding: 2px 4px;
      width: 200px;
      transition: color 0.2s, border-color 0.2s;
    }

    .api-url-row input:focus { color: var(--text); border-color: var(--accent); }

    .reset-btn {
      background: none; border: none;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .reset-btn:hover { color: #c0392b; background: rgba(192,57,43,0.07); }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">🍽️</div>
    <div class="header-text">
      <h1>ChefMate</h1>
      <p>AI Meal Planner · Powered by MCP</p>
    </div>
    <div class="status-dot">
      <div class="dot" id="statusDot"></div>
      <span id="statusLabel">offline</span>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">🍽️</div>
      <p>Olá! Sou seu assistente de nutrição. Posso te ajudar a criar refeições saudáveis, calcular calorias e organizar ingredientes.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Liste todas as refeições</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Crie uma refeição saudável com frango</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Mostre as estatísticas do banco</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Busque refeições com arroz</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Type a message…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">↑</button>
    </div>
    <div class="input-meta">
      <div class="api-url-row">
        <label>API:</label>
        <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000" />
      </div>
      <button class="reset-btn" onclick="resetConversation()">↺ reset</button>
    </div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');
  const statusDot  = document.getElementById('statusDot');
  const statusLabel= document.getElementById('statusLabel');

  function getApiBase() {
    return document.getElementById('apiUrl').value.replace(/\/$/, '');
  }

  // ── Health check ──────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${getApiBase()}/health`);
      if (res.ok) {
        statusDot.className = 'dot online';
        statusLabel.textContent = 'online';
      } else throw new Error();
    } catch {
      statusDot.className = 'dot';
      statusLabel.textContent = 'offline';
    }
  }

  checkHealth();
  setInterval(checkHealth, 10000);

  // ── Message rendering ─────────────────────────────────────────────────────
  function appendMessage(role, text, isError = false) {
    emptyState.remove?.();
    if (emptyState.parentElement) emptyState.remove();

    const wrap   = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'você' : '👨‍🍳';

    const bubble = document.createElement('div');
    bubble.className = `bubble${isError ? ' error' : ''}`;
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap   = document.createElement('div');
    wrap.className = 'msg agent';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '👨‍🍳';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    if (emptyState.parentElement) emptyState.remove();
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    autoResize(inputEl);
    sendBtn.disabled = true;
    statusDot.className = 'dot loading';
    statusLabel.textContent = 'thinking';

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch(`${getApiBase()}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.text();
        appendMessage('agent', `Error ${res.status}: ${err}`, true);
      } else {
        const data = await res.json();
        appendMessage('agent', data.reply);
      }
    } catch (e) {
      removeTyping();
      appendMessage('agent', `Could not reach the agent. Is it running at ${getApiBase()}?`, true);
    } finally {
      sendBtn.disabled = false;
      checkHealth();
      inputEl.focus();
    }
  }

  async function resetConversation() {
    try { await fetch(`${getApiBase()}/reset`, { method: 'POST' }); } catch {}
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 136) + 'px';
  }
</script>
</body>
</html>
